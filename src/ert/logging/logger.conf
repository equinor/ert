version: 1
formatters:
  terminal:
    (): ert.logging.TerminalFormatter
  simple_with_threading:
    format: '%(asctime)s - %(name)s - %(threadName)s - %(levelname)s - %(message)s'
filters:
  redact_sensitive_attributes:
    (): ert.logging.ObjectAttributeFilter
    objects: [SummaryObservation, RFTObservation, BreakthroughObservation, GeneralObservation, ShapeRegistry]
    attributes: [value, east, north]
handlers:
  file:
    level: DEBUG
    formatter: simple_with_threading
    filters: [redact_sensitive_attributes]
    (): ert.logging.TimestampedFileHandler
    use_log_dir_from_env: true
  terminal:
    level: INFO
    formatter: terminal
    class: logging.StreamHandler
    stream: ext://sys.stderr
loggers:
  asyncio:
    level: INFO
  azure.core:
    level: WARNING
  azure.monitor:
    level: WARNING
  ert.storage.migration:
    level: DEBUG
    handlers: [terminal]
    propagate: yes
  h5py:
    level: INFO
  matplotlib:
    level: INFO
  shapely:
    level: INFO
  subscript:
    level: INFO
  zmq:
    level: INFO
  urllib3:
    level: WARNING
  websockets:
    level: WARNING
  httpcore:
    level: WARNING
  httpx:
    level: WARNING
  httpx_retries:
    level: WARNING

root:
  level: DEBUG
  handlers: [file]

disable_existing_loggers: False
