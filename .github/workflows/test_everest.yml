name: everest-run-tests-build-docs

on:
  workflow_call:
    inputs:
      os:
        type: string
      python-version:
        type: string
      test-type:
        type: string

permissions:
   contents: read

env:
  NO_PROJECT_RES: 1
  UV_FROZEN: true
  OMP_NUM_THREADS: 1

jobs:
  tests-everest:
    name: Run everest tests
    timeout-minutes: 30
    runs-on: ${{ inputs.os }}

    steps:
    - name: Check /etc/hosts
      run: |
        echo "/etc/hosts ::"
        cat /etc/hosts
        if grep -q '^-' /etc/hosts; then
          echo "Found corrupted /etc/hosts - attempting fix"
          sudo sed -i s'/^-[^ ] //' /etc/hosts
          echo "/etc/hosts ::"
          cat /etc/hosts
        fi
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        filter: tree:0

    - if: ${{ inputs.os == 'macos-latest' }}
      run: echo "ERT_TESTS_RUN_ON_MAC_CI=true" >> "$GITHUB_ENV"

    - uses: ./.github/actions/install_dependencies_qt
      with:
        os: ${{ inputs.os }}

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        prune-cache: false
        python-version: ${{ inputs.python-version }}

    - name: Install EVEREST and dependencies
      run: |
        uv sync --group dev

    # Randomizes test ordering (and reseeds RNGs) to detect order-dependent
    # flaky tests. The chosen seed is printed in
    # the test output so failures can be reproduced with --randomly-seed=N.
    - name: Enable randomized test ordering (Python 3.14)
      if: inputs.python-version == '3.14' && inputs.test-type == 'test'
      run: |
        uv pip install pytest-randomly

    - name: Run Tests Linux
      if: ${{ inputs.test-type == 'test' && runner.os != 'macOS'}}
      run: |
        ERT_PYTEST_ARGS='--cov=ert --cov=everest --cov=_ert --cov-report=xml:cov1.xml --junit-xml=junit.xml -o junit_family=legacy -v' uv run just everest-tests

    - name: Run Tests macOS
      if: ${{ inputs.test-type == 'test' && runner.os == 'macOS'}}
      run: |
        ERT_PYTEST_ARGS='-n 3 --cov=ert --cov=everest --cov=_ert --cov-report=xml:cov1.xml --junit-xml=junit.xml -o junit_family=legacy -v' uv run just everest-tests

    - name: Build Documentation
      if: inputs.test-type == 'doc'
      run: |
        uv pip install git+https://github.com/equinor/everest-models.git
        uv run just build-everest-docs

    - name: Upload coverage to Codecov
      if: inputs.test-type != 'everest-docs-entry-test' && inputs.test-type != 'doc'
      id: codecov1
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      continue-on-error: true
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        files: cov1.xml
        flags: ${{ inputs.test-type }}
    - name: codecov retry sleep
      if: steps.codecov1.outcome == 'failure' && inputs.test-type != 'everest-docs-entry-test' && inputs.test-type != 'doc'
      run: |
        sleep 30
    - name: Codecov retry
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      if: steps.codecov1.outcome == 'failure' && inputs.test-type != 'everest-docs-entry-test' && inputs.test-type != 'doc'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: cov1.xml
        flags: ${{ inputs.test-type }}
        fail_ci_if_error: ${{ github.ref == 'refs/heads/main' }}

    - name: Upload test results to Codecov
      if: ${{ !cancelled() && inputs.test-type != 'everest-docs-entry-test' && inputs.test-type != 'doc' }}
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results
        files: junit.xml

    - name: Test for a clean repository
      if: ${{ inputs.test-type != 'everest-docs-entry-test' && inputs.test-type != 'doc' }}
      run: |
        # Remove things we have generated on purpose:
        ls -la
        rm -rf .coverage
        rm -f coverage.xml cov1.xml junit.xml
        rm -f ert.*.whl
        rm -f codecov.SHA*
        rm -f codecov
        rm -f .coverage.*
        git status --porcelain
        test -z "$(git status --porcelain)"
