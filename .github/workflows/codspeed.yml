name: CodSpeed

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
  workflow_call:

permissions:
   contents: read

env:
  UV_FROZEN: true
  OMP_NUM_THREADS: 1

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install_dependencies_qt
        with:
          os: ubuntu-latest
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          prune-cache: false
          python-version: '3.12'
      - run: |
          uv sync --group dev
          uv pip uninstall pytest-benchmark
          uv pip install pytest-codspeed
      - uses: CodSpeedHQ/action@c381be0bfd20e844fb45594f6aa182ffcd94545c # v4.15.0
        with:
          mode: simulation
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: |
            uv run pytest tests/ert/performance_tests --codspeed --timeout=1200 -m "not memory_test"
