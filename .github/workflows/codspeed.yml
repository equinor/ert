name: CodSpeed

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
  workflow_call:

permissions:
   contents: read

env:
  UV_FROZEN: true
  OMP_NUM_THREADS: 1

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/install_dependencies_qt
        with:
          os: ubuntu-latest
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
          python-version: '3.14'
      - run: |
          uv sync --group dev
          uv pip uninstall pytest-benchmark
          uv pip install pytest-codspeed
      - uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4.17.6
        with:
          mode: simulation
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: |
            uv run pytest tests/ert/performance_tests --codspeed --timeout=1200 -m "not memory_test"
