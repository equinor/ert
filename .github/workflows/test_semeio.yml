name: Test Semeio

# This job checks whether current main of semeio
# is compatible with the changes. It is not required to pass
# before merging, but breakage should be followed by fix in semeio
# after merge.

on:
 push:
   branches:
     - main
     - 'version-**'
 workflow_call:
 workflow_dispatch:


permissions:
   contents: read

env:
  UV_FROZEN: true
  OMP_NUM_THREADS: 1

jobs:
  test-semeio:
    name: Test Semeio
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        filter: tree:0

    - uses: ./.github/actions/install_dependencies_qt
      with:
        os: ubuntu-latest

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        prune-cache: false
        python-version: ${{ matrix.python-version }}

    - name: Install ert
      run: |
        uv sync

    - name: Get semeio
      run: |
        git clone https://github.com/equinor/semeio.git

    - name: Test semeio
      run: |
        pushd semeio
        VIRTUAL_ENV=../.venv uv pip install ".[test]"
        UV_PROJECT_ENVIRONMENT=../.venv uv run --no-sync pytest -n logical --ert-integration
